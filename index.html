<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1E2229">
<title>Escala Certa</title>

<style>
  :root{
    --bg:#141619; --panel:#1E2229; --panelHi:#262B33; --line:#333A44;
    --ink:#E8EAED; --mut:#8A929E; --yellow:#F5C518; --red:#E5443B;
    --blue:#4FB0E0; --lcd:#B9C7A6; --lcdBg:#2A3128; --green:#4FBF7B;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; background:var(--bg);}
  body{font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:var(--ink);}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
  button{font-family:inherit;}
  #app{max-width:430px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;
       background:var(--bg); position:relative;}
  header{padding:16px 18px 12px; border-bottom:1px solid var(--line); background:var(--panel);
         position:sticky; top:0; z-index:5;}
  .brandrow{display:flex; align-items:center; gap:10px;}
  .logo{width:30px; height:30px; border-radius:8px; background:var(--yellow);
        display:flex; align-items:center; justify-content:center;}
  .title{font-weight:800; letter-spacing:.04em; font-size:17px;}
  .title span{color:var(--yellow);}
  .sub{color:var(--mut); font-size:10.5px; margin-top:-2px;}
  main{flex:1; padding:16px; padding-bottom:92px; overflow-y:auto;}
  nav{position:sticky; bottom:0; display:flex; background:var(--panel); border-top:1px solid var(--line);}
  nav button{flex:1; padding:10px 0 12px; background:none; border:none; cursor:pointer;
             display:flex; flex-direction:column; align-items:center; gap:4px; color:var(--mut);
             border-top:2px solid transparent; margin-top:-1px;}
  nav button.on{color:var(--yellow); border-top-color:var(--yellow);}
  nav .lbl{font-size:10.5px; letter-spacing:.02em;}
  svg{display:block;}
  .h1{font-size:18px; font-weight:700;}
  .lead{color:var(--mut); font-size:12.5px; margin-top:2px; line-height:1.5;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:14px; cursor:pointer;
        color:var(--ink); text-align:left;}
  .pick{padding:14px 10px 13px; display:flex; flex-direction:column; align-items:center; gap:9px; text-align:center;}
  .pick .ilu{width:74px; height:74px; background:var(--panelHi); border-radius:12px; padding:7px;
             display:flex; align-items:center; justify-content:center;}
  .pick .ilu svg{width:100%; height:100%;}
  .pick .nm{font-size:13px; font-weight:600;}
  .pick .tag{font-size:10px; letter-spacing:.04em; padding:2px 7px; border-radius:999px;}
  .note{display:flex; align-items:flex-start; gap:8px; color:var(--mut); font-size:12px; line-height:1.5;}
  .back{background:none; border:none; cursor:pointer; color:var(--mut); display:flex; align-items:center;
        gap:6px; padding:0 0 10px; font-size:13px;}
  .res{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px;}
  .rhead{display:flex; align-items:center; gap:12px; margin-bottom:12px;}
  .badge{width:52px; height:52px; border-radius:12px; color:#141619; font-weight:800; font-size:18px;
         display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .rname{font-weight:700; font-size:16px;}
  .rdial{color:var(--mut); font-size:12px;}
  .lcd{background:var(--lcdBg); border:1px solid var(--line); border-radius:10px; padding:18px 16px;
       box-shadow:inset 0 2px 8px rgba(0,0,0,.5); margin-bottom:12px;}
  .lcd .val{color:var(--lcd); letter-spacing:.05em; font-size:30px; line-height:1.15; font-weight:700;}
  .ctx{display:flex; align-items:flex-start; gap:8px; background:var(--panelHi); border-radius:10px;
       padding:10px 12px; margin-bottom:12px; font-size:13px; line-height:1.5;}
  .bloco{margin-bottom:12px;}
  .blabel{color:var(--mut); font-size:11px; letter-spacing:.08em; margin-bottom:4px;}
  .btext{font-size:13.5px; line-height:1.55;}
  .warn{background:rgba(229,68,59,.12); border:1px solid var(--red); border-radius:10px; padding:10px 12px; margin-top:4px;}
  .warnhead{display:flex; align-items:center; gap:6px; color:var(--red); font-size:12px; font-weight:700;}
  .warntext{font-size:12.5px; line-height:1.5; margin-top:4px;}
  .acc{background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden; margin-bottom:10px;}
  .accbtn{width:100%; padding:14px; background:none; border:none; cursor:pointer; display:flex;
          align-items:center; gap:12px; color:var(--ink);}
  .badgeSm{width:44px; height:44px; border-radius:10px; color:#141619; font-weight:800; font-size:16px;
           display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .accmid{flex:1; text-align:left;}
  .accmid .t{font-weight:700; font-size:14.5px;}
  .accmid .d{color:var(--mut); font-size:11.5px;}
  .chev{transition:transform .2s;}
  .chev.r{transform:rotate(90deg);}
  .accbody{padding:0 14px 14px;}
  .meter{padding:14px; display:flex; align-items:center; gap:14px; width:100%;}
  .mimg{width:46px; height:58px; border-radius:8px; border:1px solid var(--line); flex-shrink:0;
        padding:4px; display:flex; flex-direction:column; gap:3px;}
  .mimg .disp{height:16px; border-radius:3px; background:var(--lcdBg); border:1px solid var(--line);}
  .mimg .dial{flex:1; border-radius:50%; background:#141619; position:relative;}
  .mimg .needle{position:absolute; width:2px; height:12px; left:50%; top:50%;
                transform:translate(-50%,-90%) rotate(35deg); transform-origin:bottom center;}
  .minfo{flex:1; text-align:left;}
  .minfo .n{font-weight:700; font-size:15px;}
  .minfo .ty{color:var(--mut); font-size:12px;}
  .minfo .sc{color:var(--mut); font-size:10.5px; margin-top:4px;}
  .infobar{display:flex; align-items:flex-start; gap:8px; background:var(--panelHi); border-radius:10px;
           padding:10px 12px; font-size:12.5px; line-height:1.5;}
  .seclabel{color:var(--mut); font-size:11px; letter-spacing:.08em; margin:16px 0 8px;}
  .dialwrap{margin-bottom:14px;}
  .dialbox{background:#0E1013; border:1px solid var(--line); border-radius:12px; padding:8px; display:flex; justify-content:center;}
  .dialbox svg{width:100%; max-width:290px; height:auto;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brandrow">
      <div class="logo" id="ic-logo"></div>
      <div>
        <div class="title mono">ESCALA <span>CERTA</span></div>
        <div class="sub">seu multímetro sem mistério</div>
      </div>
    </div>
  </header>
  <main id="main"></main>
  <nav id="nav"></nav>
</div>

function resultado(e, ctx){
  return '<div class="res"><div class="rhead"><div class="badge mono" style="background:'+e.cor+'">'+e.sigla+'</div>'+
    '<div><div class="rname">'+e.nome+'</div><div class="rdial">Posi\u00e7\u00e3o no seletor: '+e.dial+'</div></div></div>'+
    '<div class="lcd"><div class="val mono">'+e.mostra+'</div></div>'+
    (ctx?'<div class="ctx">'+icon('info',16,e.cor)+'<span>'+ctx+'</span></div>':'')+
    bloco('PARA QUE SERVE', e.pra)+bloco('COMO USAR', e.como)+
    (e.faixas!=='\u2014'?bloco('FAIXAS T\u00cdPICAS', e.faixas):'')+
    (e.perigo?'<div class="warn"><div class="warnhead">'+icon('alert',14)+' ALTA TENS\u00c3O \u2014 CUIDADO</div>'+
      '<div class="warntext">Nunca toque nas partes met\u00e1licas das pontas. Confirme que o mult\u00edmetro est\u00e1 em tens\u00e3o AC (V~) e numa faixa alta antes de encostar. Na d\u00favida, chame um eletricista.</div></div>':'')+
  '</div>';
}
/* ============ desenho do mostrador (chave seletora) ============ */
function dialSVG(dial, escalaId){
  const tA = dial.map[escalaId];
  if(tA===undefined) return '';
  const cx=150, cy=150, R=113, tickR=128, knobR=56;
  const GRP={off:'#8A929E',dc:'#4FB0E0',ac:'#E5443B',ohm:'#F5C518',dca:'#4FB0E0',dio:'#4FB0E0'};
  const rad=d=>d*Math.PI/180;
  const tp=dial.pos.find(p=>p.a===tA)||{g:'off',t:''};
  const tcol=GRP[tp.g]||'#8A929E';
  let els='<circle cx="150" cy="150" r="138" fill="#181B20" stroke="#333A44" stroke-width="2"/>';
  dial.pos.forEach(p=>{
    const a=rad(p.a);
    const lx=cx+R*Math.sin(a), ly=cy-R*Math.cos(a);
    const tx=cx+tickR*Math.sin(a), ty=cy-tickR*Math.cos(a);
    const col=GRP[p.g]||'#8A929E', isT=(p.a===tA);
    els+='<circle cx="'+tx.toFixed(1)+'" cy="'+ty.toFixed(1)+'" r="'+(isT?3.6:2.1)+'" fill="'+col+'"/>';
    if(isT){
      els+='<rect x="'+(lx-19).toFixed(1)+'" y="'+(ly-10).toFixed(1)+'" width="38" height="20" rx="10" fill="'+col+'"/>'+
        '<text x="'+lx.toFixed(1)+'" y="'+(ly+4.5).toFixed(1)+'" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#141619">'+p.t+'</text>';
    }else{
      els+='<text x="'+lx.toFixed(1)+'" y="'+(ly+3.5).toFixed(1)+'" text-anchor="middle" font-family="monospace" font-size="10" fill="'+col+'">'+p.t+'</text>';
    }
  });
  els+='<g transform="rotate('+tA+' 150 150)">'+
    '<circle cx="150" cy="150" r="'+knobR+'" fill="#F3A81C" stroke="#C98A00" stroke-width="2"/>'+
    '<rect x="145" y="'+(150-knobR+4)+'" width="10" height="'+(knobR-2)+'" rx="5" fill="#C98A00"/>'+
    '<path d="M150 '+(150-knobR-6)+' l-7 10 h14 z" fill="'+tcol+'" stroke="#141619" stroke-width="1"/>'+
  '</g>';
  return '<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">'+els+'</svg>';
}
function dialBlock(m, escalaId){
  if(!m.dial) return '';
  const svg=dialSVG(m.dial, escalaId);
  if(!svg) return '';
  const cap=m.verif ? 'DEIXE A CHAVE ASSIM' : 'DEIXE A CHAVE ASSIM \u00b7 layout aproximado';
  return '<div class="dialwrap"><div class="blabel mono">'+cap+'</div>'+
    '<div class="dialbox">'+svg+'</div></div>';
}
function gridAlvos(){
  return '<div class="grid">'+ALVOS.map(a=>{
    const col = a.escala==='vac'?C.red:C.yellow;
    const bg  = a.escala==='vac'?'rgba(229,68,59,.15)':'rgba(245,197,24,.15)';
    const e   = getE(a.escala);
    return '<button class="card pick" data-act="alvo" data-id="'+a.id+'">'+
      '<div class="ilu">'+ILU[a.id]+'</div>'+
      '<span class="nm">'+a.nome+'</span>'+
      '<span class="tag mono" style="background:'+bg+';color:'+col+'">'+e.sigla+'</span>'+
    '</button>';
  }).join('')+'</div>';
}

function gridVariantes(a){
  return '<div class="grid">'+a.variantes.map(v=>{
    const esc = v.escala || a.escala;
    const e   = getE(esc);
    const col = esc==='vac'?C.red:C.yellow;
    const bg  = esc==='vac'?'rgba(229,68,59,.15)':'rgba(245,197,24,.15)';
    return '<button class="card pick" data-act="variante" data-id="'+v.id+'">'+
      '<div class="ilu">'+ILU[v.ilu]+'</div>'+
      '<span class="nm">'+v.nome+'</span>'+
      '<span class="tag mono" style="background:'+bg+';color:'+col+'">'+e.sigla+'</span>'+
    '</button>';
  }).join('')+'</div>';
}

/* ============ Tela Testar (escolha visual) ============ */
function telaTestar(){
  if(state.alvo){
    const a = getA(state.alvo);
    // 1) tem modelos e ainda n\u00e3o escolheu \u2192 sub-lista de modelos
    if(a.variantes && !state.variante){
      return '<button class="back" data-act="voltar">'+icon('arrow',16)+' Escolher outro</button>'+
        '<div style="display:flex;align-items:center;gap:10px;margin:2px 0 2px">'+
        '<div style="width:34px;height:34px;flex-shrink:0">'+ILU[a.id]+'</div>'+
        '<div style="font-size:18px;font-weight:700">'+a.nome+'</div></div>'+
        '<div class="lead" style="margin-bottom:14px">Qual \u00e9 o seu? Toque no modelo mais parecido.</div>'+
        gridVariantes(a);
    }
    // 2) resolve escala + contexto (com ou sem variante)
    let esc = a.escala, ctx = a.dica, nome = a.nome, iluKey = a.id, temVar = !!a.variantes;
    if(a.variantes && state.variante){
      const v = a.variantes.find(x=>x.id===state.variante);
      esc = v.escala || a.escala; ctx = v.nota; nome = a.nome+' \u00b7 '+v.nome; iluKey = v.ilu;
    }
    const e = getE(esc);
    const backAct = temVar ? 'voltarVar' : 'voltar';
    const backTxt = temVar ? 'Ver modelos' : 'Escolher outro';
    return '<button class="back" data-act="'+backAct+'">'+icon('arrow',16)+' '+backTxt+'</button>'+
      '<div style="display:flex;align-items:center;gap:10px;margin:2px 0 14px">'+
      '<div style="width:38px;height:38px;flex-shrink:0">'+ILU[iluKey]+'</div>'+
      '<div style="font-size:16.5px;font-weight:700;line-height:1.25">'+nome+'</div></div>'+ resultado(e, ctx);
  }
  return '<div style="margin-bottom:14px"><div class="h1">O que voc\u00ea vai testar?</div>'+
    '<div class="lead">Toque na figura parecida com o objeto. O app mostra a escala certa do mult\u00edmetro.</div></div>'+
    gridAlvos();
}

/* ============ Tela Manual ============ */
function telaManual(){
  const items = ESCALAS.map(e=>{
    const open = state.escala===e.id;
    return '<div class="acc" style="'+(open?'border-color:'+e.cor:'')+'">'+
      '<button class="accbtn" data-act="escala" data-id="'+e.id+'">'+
        '<div class="badgeSm mono" style="background:'+e.cor+'">'+e.sigla+'</div>'+
        '<div class="accmid"><div class="t">'+e.nome+'</div><div class="d">'+e.pra.slice(0,42)+'\u2026</div></div>'+
        (e.perigo?icon('alert',16,C.red):'')+
        '<span class="chev'+(open?' r':'')+'">'+icon('chev',18,'var(--mut)')+'</span></button>'+
      (open?'<div class="accbody">'+resultado(e)+'</div>':'')+'</div>';
  }).join('');
  return '<div style="margin-bottom:14px"><div class="h1">Manual universal</div>'+
    '<div class="lead">As escalas b\u00e1sicas que aparecem em qualquer mult\u00edmetro. Toque para abrir.</div></div>'+items;
}

/* ============ Tela Mult\u00edmetros ============ */
function telaMeters(){
  if(state.meter){
    const m = METERS.find(x=>x.id===state.meter);
    const escalas = m.tem.map(id=>{
      const e = getE(id), open = state.escala===id;
      return '<div class="acc" style="margin-bottom:8px;'+(open?'border-color:'+e.cor:'')+'">'+
        '<button class="accbtn" data-act="escala" data-id="'+id+'" style="padding:12px">'+
          '<div class="badgeSm mono" style="width:40px;height:40px;font-size:15px;background:'+e.cor+'">'+e.sigla+'</div>'+
          '<div class="accmid"><div class="t" style="font-size:14px">'+e.nome+'</div></div>'+
          (e.perigo?icon('alert',15,C.red):'')+
          '<span class="chev'+(open?' r':'')+'">'+icon('chev',17,'var(--mut)')+'</span></button>'+
        (open?'<div class="accbody">'+dialBlock(m,id)+resultado(e)+'</div>':'')+'</div>';
    }).join('');
    return '<button class="back" data-act="voltar">'+icon('arrow',16)+' Todos os modelos</button>'+
      '<div style="display:flex;align-items:center;gap:12px;margin:4px 0 6px">'+meterImg(m.cor)+
        '<div><div class="h1">'+m.nome+'</div><div class="ty" style="color:var(--mut);font-size:12px">'+m.tipo+' \u00b7 '+m.nota+'</div></div></div>'+
      '<div class="infobar" style="margin:10px 0 4px">'+icon('info',15,C.yellow)+'<span>'+m.falta+'</span></div>'+
      '<div class="seclabel mono">ESCALAS DESTE MODELO</div>'+escalas;
  }
  const list = METERS.map(m=>{
    const sc = m.tem.map(t=>getE(t).sigla).join('  ');
    return '<button class="card meter" data-act="meter" data-id="'+m.id+'">'+meterImg(m.cor)+
      '<div class="minfo"><div class="n">'+m.nome+'</div><div class="ty">'+m.tipo+' \u00b7 '+m.nota+'</div>'+
      '<div class="sc mono">'+sc+'</div></div>'+icon('chev',18,'var(--mut)')+'</button>';
  }).join('');
  return '<div style="margin-bottom:14px"><div class="h1">Mult\u00edmetros comuns</div>'+
    '<div class="lead">Modelos mais baratos e populares. Toque para ver as escalas de cada um.</div></div>'+
    '<div style="display:flex;flex-direction:column;gap:10px">'+list+'</div>';
}

/* ============ render ============ */
function render(){
  document.getElementById('ic-logo').innerHTML = icon('gauge',18,'#141619');
  const main = document.getElementById('main');
  if(state.tab==='testar') main.innerHTML = telaTestar();
  else if(state.tab==='manual') main.innerHTML = telaManual();
  else main.innerHTML = telaMeters();

  const tabs = [{id:'testar',label:'Testar',ic:'grid'},{id:'manual',label:'Manual',ic:'book'},{id:'meters',label:'Mult\u00edmetros',ic:'gauge'}];
  document.getElementById('nav').innerHTML = tabs.map(t=>{
    const on = state.tab===t.id;
    return '<button class="'+(on?'on':'')+'" data-act="tab" data-id="'+t.id+'">'+
      icon(t.ic,20,on?'var(--yellow)':'var(--mut)')+'<span class="lbl mono">'+t.label+'</span></button>';
  }).join('');
}

/* ============ eventos ============ */
document.getElementById('app').addEventListener('click', ev=>{
  const btn = ev.target.closest('[data-act]'); if(!btn) return;
  const act = btn.dataset.act, id = btn.dataset.id;
  if(act==='tab'){ state = {tab:id, alvo:null, variante:null, meter:null, escala:null}; }
  else if(act==='alvo'){ state.alvo = id; state.variante = null; }
  else if(act==='variante'){ state.variante = id; }
  else if(act==='meter'){ state.meter = id; state.escala = null; }
  else if(act==='escala'){ state.escala = (state.escala===id?null:id); }
  else if(act==='voltarVar'){ state.variante = null; }
  else if(act==='voltar'){ state.alvo=null; state.variante=null; state.meter=null; state.escala=null; }
  render();
  document.getElementById('main').scrollTop = 0;
});

render();
</script>
